services:
  postgres:
    image: postgres:16-alpine
    container_name: dream_hub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dream_hub
      POSTGRES_PASSWORD: dream_hub_password
      POSTGRES_DB: dream_hub_db
    ports:
      - "5433:5432" # host:container (5433 to avoid clashing with a local Postgres install)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dream_hub -d dream_hub_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dream_hub_redis
    restart: unless-stopped
    ports:
      - "6380:6379" # host:container (6380 to avoid clashing with a local Redis install)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
